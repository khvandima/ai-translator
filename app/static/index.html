<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: rgba(240,237,232,0.5);
    --text3: rgba(240,237,232,0.28);
    --accent: #c8f55a;
    --accent-dim: rgba(200,245,90,0.12);
    --accent-text: #0f0f0f;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    overflow: hidden;
  }

  #app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; height: 100%; }
  .screen.active { display: flex; }

  /* ── SETUP SCREEN ── */
  #screen-setup {
    padding: 48px 24px 36px;
    gap: 32px;
    overflow-y: auto;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }

  .logo-mark svg { width: 20px; height: 20px; }

  .logo h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo p {
    font-size: 13px;
    color: var(--text2);
    font-weight: 300;
  }

  .form-group { display: flex; flex-direction: column; gap: 8px; }

  .form-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .form-select {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px 40px 14px 16px;
    width: 100%;
    cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='rgba(240,237,232,0.4)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 16px center;
    transition: border-color 0.15s;
  }

  .form-select:focus { outline: none; border-color: var(--accent); }
  .form-select option { background: #1a1a1a; }

  .btn-primary {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 16px;
    width: 100%;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }

  .btn-primary:active { opacity: 0.85; transform: scale(0.99); }

  /* ── QR SCREEN ── */
  #screen-qr {
    padding: 48px 24px 36px;
    gap: 28px;
    align-items: center;
    overflow-y: auto;
  }

  #screen-qr .back-btn {
    align-self: flex-start;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0;
  }

  .qr-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
  }

  .qr-card img, #qr-image {
    width: 200px;
    height: 200px;
    border-radius: 12px;
    background: #fff;
    padding: 8px;
  }

  .qr-meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .qr-meta p { font-size: 14px; color: var(--text2); text-align: center; }
  .qr-meta span { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .session-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }

  .info-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .info-chip .chip-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
  .info-chip .chip-value { font-size: 14px; color: var(--text); font-weight: 500; }

  .waiting-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 10px 18px;
  }

  .waiting-dots { display: flex; gap: 4px; }
  .waiting-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text3);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
  .waiting-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .waiting-indicator p { font-size: 13px; color: var(--text2); }

  /* ── JOIN SCREEN ── */
  #screen-join {
    padding: 48px 24px 36px;
    gap: 28px;
    justify-content: center;
  }

  #screen-join .join-header { text-align: center; }
  #screen-join .join-header h2 { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 6px; }
  #screen-join .join-header p { font-size: 14px; color: var(--text2); }

  .context-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(200,245,90,0.2);
    border-radius: 40px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    align-self: center;
  }

  /* ── CHAT SCREEN ── */
  #screen-chat { gap: 0; }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chat-header-left { display: flex; flex-direction: column; gap: 1px; }
  .chat-header-left h2 { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
  .chat-header-left span { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 6px rgba(200,245,90,0.4); }

  .chat-header-right { display: flex; align-items: center; gap: 10px; }

  .tts-toggle {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 40px; padding: 5px 10px 5px 8px;
    cursor: pointer; transition: background 0.2s, border-color 0.2s;
    user-select: none; -webkit-user-select: none;
  }
  .tts-toggle.on { background: rgba(200,245,90,0.1); border-color: rgba(200,245,90,0.3); }
  .tts-toggle-label { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; transition: color 0.2s; }
  .tts-toggle.on .tts-toggle-label { color: var(--accent); }

  .end-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.25);
    color: rgba(255,100,100,0.8);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .end-btn:hover { background: rgba(255,80,80,0.2); border-color: rgba(255,80,80,0.4); }

  .playing-bar {
    display: none; align-items: center; gap: 4px;
    padding: 2px 8px; margin-top: 4px;
    background: rgba(200,245,90,0.1); border-radius: 20px;
    align-self: flex-start;
  }
  .playing-bar.active { display: flex; }
  .playing-bar span { font-size: 10px; color: var(--accent); font-family: 'DM Mono', monospace; }
  .eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 10px; }
  .eq-bar { width: 2px; background: var(--accent); border-radius: 1px; animation: eq 0.8s ease-in-out infinite; }
  .eq-bar:nth-child(2) { animation-delay: 0.15s; }
  .eq-bar:nth-child(3) { animation-delay: 0.3s; }
  @keyframes eq { 0%,100%{height:3px} 50%{height:9px} }

  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .messages-container::-webkit-scrollbar { width: 0; }

  .msg-wrap { display: flex; flex-direction: column; gap: 3px; animation: msgIn 0.18s ease-out; }
  .msg-wrap.me { align-items: flex-end; }
  .msg-wrap.them { align-items: flex-start; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble {
    max-width: 82%;
    border-radius: 18px;
    padding: 10px 14px;
  }

  .bubble.me {
    background: var(--accent);
    color: var(--accent-text);
    border-bottom-right-radius: 5px;
  }

  .bubble.them {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-bottom-left-radius: 5px;
  }

  .bubble-main { font-size: 16px; line-height: 1.4; font-weight: 400; }
  .bubble.me .bubble-main { color: #0f0f0f; }
  .bubble.them .bubble-main { color: var(--text); }

  .bubble-sub {
    font-size: 11px;
    margin-top: 4px;
    line-height: 1.3;
    font-style: italic;
  }
  .bubble.me .bubble-sub { color: rgba(15,15,15,0.5); }
  .bubble.them .bubble-sub { color: var(--text3); }

  .system-msg {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    padding: 4px 0;
  }

  .chat-footer {
    padding: 12px 20px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .text-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 18px;
    outline: none;
    transition: border-color 0.15s;
  }

  .text-input:focus { border-color: rgba(200,245,90,0.4); }
  .text-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .send-btn:hover { background: var(--surface2); border-color: var(--border2); }
  .send-btn svg { width: 18px; height: 18px; }

  .ptt-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }

  .ptt-btn.recording {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.08);
  }

  .ptt-btn.recording svg path { stroke: #0f0f0f; }
  .ptt-btn svg { width: 20px; height: 20px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 40px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--text2);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP SCREEN (User A) -->
  <div id="screen-setup" class="screen active">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 10h14M10 3l7 7-7 7" stroke="#0f0f0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>AI Translator</h1>
      <p>Real-time translation for two people</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="form-group">
        <label class="form-label">My language</label>
        <select id="lang-a" class="form-select">
          <option value="ru">Русский</option>
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="zh">中文</option>
          <option value="tr">Türkçe</option>
          <option value="it">Italiano</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="th">ภาษาไทย</option>
          <option value="vi">Tiếng Việt</option>
          <option value="hi">हिन्दी</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Context</label>
        <select id="context" class="form-select">
          <option value="general">General</option>
          <option value="medical">Medical</option>
          <option value="banking">Banking</option>
          <option value="police">Police / Legal</option>
          <option value="tourism">Tourism</option>
          <option value="legal">Legal</option>
        </select>
      </div>
    </div>

    <button class="btn-primary" onclick="createSession()">Create session</button>
  </div>

  <!-- QR SCREEN (User A — waiting) -->
  <div id="screen-qr" class="screen">
    <button class="back-btn" onclick="showScreen('setup')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>

    <div class="qr-card">
      <img id="qr-image" src="" alt="QR Code">
      <div class="qr-meta">
        <p>Show this QR to your partner</p>
        <span id="qr-session-id">—</span>
      </div>
    </div>

    <div class="session-info">
      <div class="info-chip">
        <span class="chip-label">My language</span>
        <span class="chip-value" id="info-lang-a">—</span>
      </div>
      <div class="info-chip">
        <span class="chip-label">Context</span>
        <span class="chip-value" id="info-context">—</span>
      </div>
    </div>

    <div class="waiting-indicator">
      <div class="waiting-dots">
        <span></span><span></span><span></span>
      </div>
      <p>Waiting for partner...</p>
    </div>
  </div>

  <!-- JOIN SCREEN (User B — after scanning QR) -->
  <div id="screen-join" class="screen">
    <div class="join-header">
      <h2>Join session</h2>
      <p>Your partner is waiting</p>
    </div>

    <span class="context-badge" id="join-context-badge">general</span>

    <div class="form-group">
      <label class="form-label">My language</label>
      <select id="lang-b" class="form-select">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="zh">中文</option>
        <option value="tr">Türkçe</option>
        <option value="it">Italiano</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="th">ภาษาไทย</option>
        <option value="vi">Tiếng Việt</option>
        <option value="hi">हिन्दी</option>
      </select>
    </div>

    <button class="btn-primary" onclick="joinSession()">Join session</button>
  </div>

  <!-- CHAT SCREEN (both users) -->
  <div id="screen-chat" class="screen">
    <div class="chat-header">
      <div class="chat-header-left">
        <h2>AI Translator</h2>
        <span id="chat-context-label">general</span>
      </div>
      <div class="chat-header-right">
        <div class="tts-toggle on" id="tts-toggle" onclick="toggleTTS()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" id="tts-icon">
            <path d="M5 4.5L9 7L5 9.5V4.5Z" fill="#c8f55a"/>
            <path d="M10.5 4.5C11.8 5.3 11.8 8.7 10.5 9.5" stroke="#c8f55a" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span class="tts-toggle-label" id="tts-label">voice on</span>
        </div>
        <button class="end-btn" onclick="endSession()" title="End session">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="status-dot" id="status-dot"></div>
      </div>
    </div>

    <div class="messages-container" id="messages"></div>

    <div class="chat-footer">
      <input
        type="text"
        class="text-input"
        id="text-input"
        placeholder="Type a message..."
        onkeydown="if(event.key==='Enter') sendTextMessage()"
      >
      <button class="send-btn" onclick="sendTextMessage()" title="Send">
        <svg viewBox="0 0 20 20" fill="none"><path d="M4 10h12M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button
        class="ptt-btn"
        id="ptt-btn"
        title="Hold to talk"
        ontouchstart="startPTT(event)"
        ontouchend="stopPTT(event)"
        onmousedown="startPTT(event)"
        onmouseup="stopPTT(event)"
      >
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M10 2a3 3 0 0 1 3 3v5a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 10a5 5 0 0 0 10 0M10 15v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  let ws = null;
  let sessionId = null;
  let myRole = null;
  let myLang = null;
  let mediaRecorder = null;
  let audioChunks = [];

  const BASE_URL = window.location.origin;
  const WS_URL = BASE_URL.replace(/^http/, 'ws');

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
  }

  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function getLangLabel(code) {
    const map = { ru:'Русский', en:'English', es:'Español', fr:'Français',
                  zh:'中文', tr:'Türkçe', it:'Italiano',
                  ja:'日本語', ko:'한국어', th:'ภาษาไทย', vi:'Tiếng Việt', hi:'हिन्दी' };
    return map[code] || code;
  }

  // ── USER A: CREATE SESSION ──
  async function createSession() {
    const langA = document.getElementById('lang-a').value;
    const context = document.getElementById('context').value;

    try {
      const res = await fetch('/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ language_a: langA, language_b: langA, context }),
      });
      const data = await res.json();
      sessionId = data.session_id;

      document.getElementById('qr-image').src = data.qr_url;
      document.getElementById('qr-session-id').textContent = sessionId;
      document.getElementById('info-lang-a').textContent = getLangLabel(langA);
      document.getElementById('info-context').textContent = context;

      showScreen('qr');
      connectWS(sessionId, 'user_a');
    } catch (e) {
      showToast('Failed to create session');
    }
  }

  // ── USER B: JOIN SESSION ──
  function initJoinScreen() {
    const path = window.location.pathname;
    const match = path.match(/\/join\/([^/]+)/);
    if (match) {
      sessionId = match[1];
      fetch('/session/' + sessionId)
        .then(r => r.json())
        .then(data => {
          document.getElementById('join-context-badge').textContent = data.context;
        })
        .catch(() => {});
      showScreen('join');
    }
  }

  async function joinSession() {
    const langB = document.getElementById('lang-b').value;
    myLang = langB;
    try {
      await fetch('/session/' + sessionId + '/language_b', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ language_b: langB }),
      });
    } catch (e) {}
    connectWS(sessionId, 'user_b');
  }

  // ── WEBSOCKET ──
  function connectWS(sid, role) {
    myRole = role;
    ws = new WebSocket(`${WS_URL}/ws/${sid}/${role}`);

    ws.onopen = () => {
      document.getElementById('status-dot').classList.add('connected');
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      handleEvent(data);
    };

    ws.onclose = () => {
      document.getElementById('status-dot').classList.remove('connected');
      showToast('Disconnected');
    };

    ws.onerror = () => showToast('Connection error');
  }

  function handleEvent(data) {
    switch (data.event) {
      case 'connected':
        myLang = data.my_language;
        document.getElementById('chat-context-label').textContent = data.context;
        if (myRole === 'user_b') showScreen('chat');
        break;

      case 'partner_joined':
        showScreen('chat');
        addSystemMsg('Partner connected');
        break;

      case 'waiting':
        break;

      case 'partner_left':
        addSystemMsg('Partner disconnected');
        document.getElementById('status-dot').classList.remove('connected');
        break;

      case 'message':
        addMessage(data);
        break;

      case 'pong':
        break;

      case 'session_ended':
        if (ws) ws.close();
        sessionId = null;
        myRole = null;
        myLang = null;
        document.getElementById('messages').innerHTML = '';
        showScreen('setup');
        showToast('Session ended');
        break;
    }
  }

  let ttsEnabled = true;

  function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    const toggle = document.getElementById('tts-toggle');
    const label = document.getElementById('tts-label');
    const icon = document.getElementById('tts-icon');
    toggle.classList.toggle('on', ttsEnabled);
    label.textContent = ttsEnabled ? 'voice on' : 'voice off';
    icon.innerHTML = ttsEnabled
      ? '<path d="M5 4.5L9 7L5 9.5V4.5Z" fill="#c8f55a"/><path d="M10.5 4.5C11.8 5.3 11.8 8.7 10.5 9.5" stroke="#c8f55a" stroke-width="1.2" stroke-linecap="round"/>'
      : '<path d="M5 4.5L9 7L5 9.5V4.5Z" fill="rgba(240,237,232,0.3)"/><path d="M10.5 4.5C11.8 5.3 11.8 8.7 10.5 9.5" stroke="rgba(240,237,232,0.2)" stroke-width="1.2" stroke-linecap="round"/><line x1="2" y1="2" x2="12" y2="12" stroke="rgba(240,237,232,0.3)" stroke-width="1.2" stroke-linecap="round"/>';
  }

  async function endSession() {
    if (!confirm('End session?')) return;
    if (sessionId) {
      try {
        await fetch('/session/' + sessionId, { method: 'DELETE' });
      } catch (e) {}
    }
  }

  async function playAudio(b64, playingBar) {
    try {
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const blob = new Blob([bytes], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      playingBar.classList.add('active');
      audio.onended = () => {
        playingBar.classList.remove('active');
        URL.revokeObjectURL(url);
      };
      await audio.play();
    } catch (e) {
      playingBar.classList.remove('active');
    }
  }

  // ── MESSAGES ──
  function addMessage(data) {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + (data.from_me ? 'me' : 'them');

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (data.from_me ? 'me' : 'them');

    const main = document.createElement('div');
    main.className = 'bubble-main';
    main.textContent = data.original;

    const sub = document.createElement('div');
    sub.className = 'bubble-sub';
    sub.textContent = data.translated;

    bubble.appendChild(main);
    bubble.appendChild(sub);
    wrap.appendChild(bubble);

    if (!data.from_me) {
      const playingBar = document.createElement('div');
      playingBar.className = 'playing-bar';
      playingBar.innerHTML = '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div><span>playing</span>';
      wrap.appendChild(playingBar);

      if (ttsEnabled && data.audio) {
        playAudio(data.audio, playingBar);
      }
    }

    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  function addSystemMsg(text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  // ── SEND TEXT ──
  function sendTextMessage() {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ event: 'message', text }));
    input.value = '';
  }

  // ── PUSH TO TALK ──
  async function startPTT(e) {
    e.preventDefault();
    if (!navigator.mediaDevices) { showToast('Microphone not supported'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = sendAudio;
      mediaRecorder.start();
      document.getElementById('ptt-btn').classList.add('recording');
    } catch (err) {
      showToast('Microphone access denied');
    }
  }

  function stopPTT(e) {
    e.preventDefault();
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }
    document.getElementById('ptt-btn').classList.remove('recording');
  }

  async function sendAudio() {
    if (!audioChunks.length || !ws || ws.readyState !== WebSocket.OPEN) return;
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const reader = new FileReader();
    reader.onloadend = () => {
      ws.send(JSON.stringify({
        event: 'audio',
        data: reader.result.split(',')[1],
        mime_type: 'audio/webm',
      }));
    };
    reader.readAsDataURL(blob);
    showToast('Sending audio...');
  }

  // ── INIT ──
  if (window.location.pathname.startsWith('/join/')) {
    initJoinScreen();
  }
</script>
</body>
